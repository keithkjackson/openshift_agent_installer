---
# Disconnected baremetal deployment without provisioning network
ocp_version: "4.18.30"
cluster_name: "qt-dev-1"
base_domain: "dcs6k.fbi"
ntp_servers:
  - 10.57.101.10

# Platform configuration
platform_type: "baremetal"
#platform_type: "compact"
provisioning_network: "Disabled"

# VIP addresses
api_vip: "10.57.101.251"
ingress_vip: "10.57.101.250"

# Network configuration
machine_network_cidr: "10.57.101.0/24"
cluster_network_cidr: "10.208.0.0/14"
cluster_network_host_prefix: 23
service_network: "172.21.0.0/16"

# Rendezvous IP (first master node)
rendezvous_ip: "10.57.101.20"

# Pull secret and SSH key
pull_secret: "{{ lookup('file', '~/pull-secret.json') }}"
ssh_public_key: "{{ lookup('file', '~/.ssh/TICTU.pub') }}"

# ISO configuration
iso_http_url: "http://10.57.101.8/agent.x86_64.iso"

# iDRAC configuration
idrac_username: "root"
idrac_password: "{{ vault_idrac_password }}"

idrac_servers:
  - name: "cp0"
    idrac_ip: "10.45.4.4"
    role: "master"
  - name: "cp1"
    idrac_ip: "10.45.4.5"
    role: "master"
  - name: "cp2"
    idrac_ip: "10.45.4.6"
    role: "master"

# Agent host configurations (renamed from 'hosts' to 'agent_hosts')
agent_hosts:
  - hostname: cp-0
    rootDeviceHints:
      deviceName: "/dev/disk/by-path/pci-0000:02:00.0-scsi-0:0:0:0"
    interfaces:
    - macAddress: 24:6E:96:7D:81:A6
      name: eno3
    - macAddress: 24:6E:96:7D:81:A7
      name: eno4
    networkConfig:
      dns-resolver:
        config:
          server:
          - 10.45.6.17
      interfaces:
      - name: bond0
        type: bond
        state: up
        mac-address: 24:6E:96:7D:81:A6
        ipv4:
          enabled: true
          address:
            - ip: 10.57.101.20
              prefix-length: 24
          dhcp: false
        linkAggregation:
          mode: 802.3ad
          options:
            miimon: "150"
          port:
            - eno3
            - eno4
      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: 10.57.101.1
            next-hop-interface: bond0
  - hostname: cp-1
    rootDeviceHints:
      deviceName: "/dev/disk/by-path/pci-0000:02:00.0-scsi-0:0:0:0"
    interfaces:
    - macAddress: 24:6E:96:79:69:8C
      name: eno3
    - macAddress:	24:6E:96:79:69:8D
      name: eno4
    networkConfig:
      dns-resolver:
        config:
          server:
            - 10.45.6.17
      interfaces:
      - name: bond0
        type: bond
        state: up
        mac-address: 24:6E:96:79:69:8C
        ipv4:
          enabled: true
          address:
            - ip: 10.57.101.21
              prefix-length: 24 
          dhcp: false
        linkAggregation:
          mode: 802.3ad
          options:
            miimon: "150"
          port:
            - eno3
            - eno4
      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: 10.57.101.1
            next-hop-interface: bond0
  - hostname: cp-2
    rootDeviceHints:
      deviceName: "/dev/disk/by-path/pci-0000:02:00.0-scsi-0:0:0:0"
    interfaces:
    - macAddress: 24:6E:96:7C:DF:9A
      name: eno3
    - macAddress: 24:6E:96:7C:DF:9B
      name: eno4
    networkConfig:
      dns-resolver:
        config:
          server:
            - 10.45.6.17
      interfaces:
      - name: bond0
        type: bond
        state: up
        mac-address: 24:6E:96:7C:DF:9B
        ipv4:
          enabled: true
          address:
            - ip: 10.57.101.22
              prefix-length: 24 
          dhcp: false
        linkAggregation:
          mode: 802.3ad
          options:
            miimon: "150"
          port:
            - eno3
            - eno4
      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: 10.57.101.1
            next-hop-interface: bond0
# Mirror registry configuration
