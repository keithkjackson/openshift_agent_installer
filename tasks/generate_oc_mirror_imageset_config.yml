---
# Generated by Cursor — Render ImageSetConfiguration for oc-mirror plugin v2

- name: Compute effective OCP platform channel from ocp_version
  ansible.builtin.set_fact:
    _oc_mirror_platform_channel_effective: >-
      {{ oc_mirror_platform_channel
         if (oc_mirror_platform_channel | default('') | string | length) > 0
         else (ocp_version | regex_replace('^(\d+\.\d+).*$', 'stable-\1')) }}

- name: Validate oc-mirror operator catalog entries
  ansible.builtin.assert:
    that:
      - item.catalog is defined
      - item.catalog | string | length > 0
      - item.packages is defined
      - item.packages | length > 0
    fail_msg: "Each oc_mirror_operator_catalogs entry must define non-empty catalog and packages."
    success_msg: "Operator catalog entry validated."
  loop: "{{ oc_mirror_operator_catalogs }}"
  loop_control:
    label: "{{ item.catalog | default('missing catalog') }}"
  when: oc_mirror_operator_catalogs | default([]) | length > 0

- name: Validate operator package names
  ansible.builtin.assert:
    that:
      - item.1.name is defined
      - item.1.name | string | length > 0
    fail_msg: "Each package under oc_mirror_operator_catalogs must define a non-empty name."
    success_msg: "Operator package entry validated."
  loop: "{{ oc_mirror_operator_catalogs | subelements('packages') }}"
  loop_control:
    label: "{{ item.0.catalog }} / {{ item.1.name | default('?') }}"
  when: oc_mirror_operator_catalogs | default([]) | length > 0

- name: Ensure ImageSetConfiguration output directory exists
  ansible.builtin.file:
    path: "{{ oc_mirror_imageset_config_path | dirname }}"
    state: directory
    mode: '0755'

- name: Generate ImageSetConfiguration for oc-mirror v2
  ansible.builtin.template:
    src: ImageSetConfiguration-v2.yaml.j2
    dest: "{{ oc_mirror_imageset_config_path }}"
    mode: '0644'

- name: Display oc-mirror ImageSetConfiguration summary
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "oc-mirror v2 ImageSetConfiguration"
      - "=========================================="
      - "Path: {{ oc_mirror_imageset_config_path }}"
      - "Platform channel: {{ _oc_mirror_platform_channel_effective }} (from {% if oc_mirror_platform_channel | default('') | length > 0 %}oc_mirror_platform_channel{% else %}ocp_version{% endif %})"
      - "OCP version pin (min/max): {{ ocp_version }}"
      - "Operator catalogs: {{ oc_mirror_operator_catalogs | default([]) | length }}"
      - "Example: oc-mirror -c {{ oc_mirror_imageset_config_path }} file://<dir> --v2"
      - "=========================================="
